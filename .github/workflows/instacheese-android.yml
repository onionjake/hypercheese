name: Build InstaCheese APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'instacheese/**'
      - '.github/workflows/instacheese-android.yml'

concurrency:
  group: instacheese-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: instacheese
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: instacheese/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        run: npx expo prebuild --platform android --no-install
        env:
          CI: 1

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        working-directory: instacheese/android

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk instacheese.apk

      - uses: actions/upload-artifact@v4
        with:
          name: instacheese-apk
          path: instacheese/instacheese.apk
          if-no-files-found: error
